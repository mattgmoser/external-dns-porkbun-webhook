{{- if not .Values.porkbun.existingSecret.name }}
{{- if and .Values.porkbun.apiKey .Values.porkbun.secretApiKey }}
## Inline credentials. Recommended only for testing — for production use
## .Values.porkbun.existingSecret pointing at a SealedSecret or external-secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edns-porkbun.fullname" . }}-creds
  labels: {{- include "edns-porkbun.labels" . | nindent 4 }}
type: Opaque
stringData:
  PORKBUN_API_KEY: {{ .Values.porkbun.apiKey | quote }}
  PORKBUN_SECRET_API_KEY: {{ .Values.porkbun.secretApiKey | quote }}
{{- end }}
{{- end }}
