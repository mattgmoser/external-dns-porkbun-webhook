{{- include "edns-porkbun.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edns-porkbun.fullname" . }}
  labels: {{- include "edns-porkbun.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Preserve singleton rate limiting during upgrades; overlapping Pods use the
  # same Porkbun key but do not share limiter state.
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "edns-porkbun.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edns-porkbun.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      {{- if or .Values.podAnnotations (not .Values.porkbun.existingSecret.name) }}
      annotations:
        {{- if not .Values.porkbun.existingSecret.name }}
        checksum/inline-credentials: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edns-porkbun.serviceAccountName" . }}
      automountServiceAccountToken: false
      enableServiceLinks: false
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook
          image: {{ include "edns-porkbun.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          env: {{- include "edns-porkbun.env" . | nindent 12 }}
          ports:
            - name: webhook
              containerPort: {{ .Values.containerPorts.webhook }}
              protocol: TCP
            - name: ops
              containerPort: {{ .Values.containerPorts.ops }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
