## DEPRECATED LEGACY STANDALONE CHART.
##
## The ExternalDNS webhook protocol has no authentication. This chart exposes
## its mutating provider API through a ClusterIP Service, so any workload with
## network access to that Service can ask it to change DNS records. Use the
## official ExternalDNS chart sidecar configuration in the project README
## instead; it binds the provider API to 127.0.0.1 inside one Pod.

legacyStandalone:
  # Required acknowledgement for this deprecated, less-secure topology.
  acceptRisk: false

image:
  repository: ghcr.io/mattgmoser/external-dns-porkbun-webhook
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Domain managed by Porkbun
porkbun:
  # Apex zone, e.g. "example.com"
  domain: ""
  # Domain filter (defaults to [domain] if empty)
  domainFilter: []

  # API credentials. Source one of:
  #   - existingSecret + key names (preferred, GitOps-friendly)
  #   - inline (NOT for production)
  existingSecret:
    name: ""
    apiKeyKey: PORKBUN_API_KEY
    secretApiKeyKey: PORKBUN_SECRET_API_KEY
  apiKey: ""
  secretApiKey: ""

# Behavior
dryRun: false
cacheTTL: "1m"

# Logging
logLevel: info       # debug, info, warn, error
logFormat: text      # text or json

# Container listen ports. The legacy webhook listener binds all interfaces so
# that a different Pod can reach it through the Service.
containerPorts:
  webhook: 8888
  ops: 8080

# Replicas — the in-process Porkbun rate limiter is not shared across Pods.
# Only 0 (paused) or 1 is accepted.
replicaCount: 1

# Legacy Service for a separately configured ExternalDNS Deployment. Pass its
# address with ExternalDNS's --webhook-provider-url flag. The chart rejects
# NodePort and LoadBalancer because this API has no authentication.
service:
  type: ClusterIP
  webhookPort: 8888
  metricsPort: 8080
  annotations: {}

# Pod-level
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 96Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Probes
livenessProbe:
  httpGet:
    path: /healthz
    port: ops
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: /readyz
    port: ops
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 5

# ServiceMonitor for Prometheus Operator (kube-prometheus-stack)
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# RBAC: this chart needs none (it talks to Porkbun, not the k8s API).
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# Extra env vars (rarely needed)
extraEnv: []
# - name: HTTP_PROXY
#   value: http://proxy:8080
