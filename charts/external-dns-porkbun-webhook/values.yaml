# This chart wraps the official ExternalDNS chart. Values under `external-dns`
# are passed directly to that dependency. Replace every example value before
# installing, and keep txtOwnerId, txtPrefix, and txt-wildcard-replacement
# stable for the lifetime of a zone.

migration:
  # Chart 0.4.0 changes this package from a webhook-only release into a complete
  # ExternalDNS deployment. Helm templates cannot reliably identify the chart
  # version being replaced, so the first in-place upgrade from a legacy release
  # must explicitly confirm that the separately managed controller has been
  # accounted for. New installs do not need this acknowledgement and create a
  # release-owned migration marker so later routine upgrades do not need it.
  acknowledgeControllerReplacement: false

external-dns:
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/mattgmoser/external-dns-porkbun-webhook
        tag: "0.4.1"
        pullPolicy: IfNotPresent
      env:
        - name: PORKBUN_API_KEY
          valueFrom:
            secretKeyRef:
              name: porkbun-creds
              key: PORKBUN_API_KEY
        - name: PORKBUN_SECRET_API_KEY
          valueFrom:
            secretKeyRef:
              name: porkbun-creds
              key: PORKBUN_SECRET_API_KEY
        - name: PORKBUN_DOMAIN
          value: "example.com"
        - name: DOMAIN_FILTER
          value: "example.com"
        # ExternalDNS reaches this listener over loopback in the shared Pod.
        - name: WEBHOOK_LISTEN
          value: "127.0.0.1:8888"
        # The Service exposes only this separate probes/metrics listener.
        - name: OPS_LISTEN
          value: ":8080"
        - name: CACHE_TTL
          value: "1m"
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_FORMAT
          value: "json"
        - name: DRY_RUN
          value: "false"
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 96Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        readOnlyRootFilesystem: true
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 2
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
      service:
        port: 8080

  sources:
    - ingress
    - service
  domainFilters:
    - example.com
  policy: upsert-only
  registry: txt
  txtOwnerId: change-me
  # The record-type template and trailing dot keep ownership TXT records for an
  # apex CNAME/ALIAS inside the managed zone. Never change an established
  # prefix without an explicit registry migration.
  txtPrefix: external-dns-%{record_type}.
  interval: 1m
  logFormat: json

  # Keep a single writable controller during upgrades. The Porkbun limiter is
  # process-local, so overlapping webhook sidecars would bypass it.
  deploymentStrategy:
    type: Recreate

  # Porkbun writes are serialized. These values form one five-minute total
  # webhook deadline; stage unusually large migrations rather than making it
  # unbounded.
  extraArgs:
    webhook-provider-url: http://127.0.0.1:8888
    webhook-provider-read-timeout: 30s
    webhook-provider-write-timeout: 4m30s
    # Keep this stable and choose a token that cannot be confused with a real
    # first label. It prevents wildcard ownership TXT names from containing *.
    txt-wildcard-replacement: _wildcard

  podSecurityContext:
    fsGroup: 65532
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    privileged: false
    readOnlyRootFilesystem: true
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

  # Do not give the webhook sidecar the controller's Kubernetes credentials.
  # Project the API token only into the ExternalDNS container.
  serviceAccount:
    automountServiceAccountToken: false
  automountServiceAccountToken: false
  extraVolumes:
    - name: kube-api-access-external-dns
      projected:
        defaultMode: 420
        sources:
          - serviceAccountToken:
              path: token
              expirationSeconds: 3600
          - configMap:
              name: kube-root-ca.crt
              items:
                - key: ca.crt
                  path: ca.crt
          - downwardAPI:
              items:
                - path: namespace
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace
  extraVolumeMounts:
    - name: kube-api-access-external-dns
      mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true

  serviceMonitor:
    enabled: false
