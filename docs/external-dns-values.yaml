# Canonical installation values for the official ExternalDNS chart v1.21.1
# (ExternalDNS v0.21.0). Copy this file and replace every example value before
# installing. Keep txtOwnerId, txtPrefix, and txt-wildcard-replacement stable
# for the lifetime of a zone.

provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/mattgmoser/external-dns-porkbun-webhook
      tag: "0.4.1"
      pullPolicy: IfNotPresent
    env:
      - name: PORKBUN_API_KEY
        valueFrom:
          secretKeyRef:
            name: porkbun-creds
            key: PORKBUN_API_KEY
      - name: PORKBUN_SECRET_API_KEY
        valueFrom:
          secretKeyRef:
            name: porkbun-creds
            key: PORKBUN_SECRET_API_KEY
      - name: PORKBUN_DOMAIN
        value: "example.com"
      - name: DOMAIN_FILTER
        value: "example.com"
      # The unauthenticated provider API is reachable only by ExternalDNS in
      # this Pod. The ops endpoint remains available for probes and metrics.
      - name: WEBHOOK_LISTEN
        value: "127.0.0.1:8888"
      - name: OPS_LISTEN
        value: ":8080"
      - name: CACHE_TTL
        value: "1m"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: DRY_RUN
        value: "false"
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 96Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532
    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 2
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /readyz
        port: http-webhook
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    service:
      # Only the ops listener is exposed by the Service. The provider listener
      # remains on localhost:8888 inside the Pod.
      port: 8080

sources:
  - ingress
  - service
domainFilters:
  - example.com
policy: upsert-only
registry: txt
txtOwnerId: change-me
# The record-type template and trailing dot keep ownership TXT records for an
# apex CNAME/ALIAS inside the managed zone. Never change an established prefix
# without an explicit registry migration.
txtPrefix: external-dns-%{record_type}.
interval: 1m
logFormat: json

# ExternalDNS defaults to a 15-second total webhook deadline, which is too
# short for a rate-limited DNS provider or a multi-record plan. These values
# are additive. Five minutes covers roughly 200 single-record mutations at
# Porkbun's serialized request rate; multi-target changes or retries can need
# longer, while ordinary reconciliations complete much sooner. ExternalDNS
# v0.21 does not apply its generic batch-change-size setting to webhook
# providers, so stage unusually large migrations and watch both containers.
extraArgs:
  webhook-provider-url: http://127.0.0.1:8888
  webhook-provider-read-timeout: 30s
  webhook-provider-write-timeout: 4m30s
  # Keep this stable and choose a token that cannot be confused with a real
  # first label. It prevents wildcard ownership TXT names from containing *.
  txt-wildcard-replacement: _wildcard

# Keep a single writable controller during upgrades. The Porkbun limiter is
# process-local, so overlapping webhook sidecars would bypass it.
deploymentStrategy:
  type: Recreate

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 192Mi

# Disable automatic token mounts, then project the Kubernetes API credentials
# only into the ExternalDNS container. The webhook sidecar does not receive the
# controller's ServiceAccount token.
serviceAccount:
  automountServiceAccountToken: false
automountServiceAccountToken: false
extraVolumes:
  - name: kube-api-access-external-dns
    projected:
      defaultMode: 420
      sources:
        - serviceAccountToken:
            path: token
            expirationSeconds: 3600
        - configMap:
            name: kube-root-ca.crt
            items:
              - key: ca.crt
                path: ca.crt
        - downwardAPI:
            items:
              - path: namespace
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
extraVolumeMounts:
  - name: kube-api-access-external-dns
    mountPath: /var/run/secrets/kubernetes.io/serviceaccount
    readOnly: true

# Enable this when Prometheus Operator is installed and configured to discover
# ServiceMonitors in the release namespace.
serviceMonitor:
  enabled: false
