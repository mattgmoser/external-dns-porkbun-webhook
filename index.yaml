  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: |
        - kind: changed
          description: Replaced the deprecated standalone deployment with the official ExternalDNS 1.21.1 chart and its native webhook sidecar integration
        - kind: security
          description: The unauthenticated provider API now binds only to loopback inside the shared ExternalDNS Pod
        - kind: security
          description: The webhook sidecar does not receive ExternalDNS's Kubernetes ServiceAccount token
        - kind: fixed
          description: Reactivated the package with a supported same-Pod topology and a permanent Artifact Hub link
        - kind: fixed
          description: Made ALIAS ownership records compatible with the ExternalDNS v0.21 TXT registry, including apex names
        - kind: fixed
          description: Made partial TXT-registry creates, updates, and deletes recoverable without exposing unowned DNS records
        - kind: fixed
          description: Added a validated wildcard replacement so ExternalDNS always generates valid wildcard ownership TXT names
      artifacthub.io/containsSecurityUpdates: "true"
      artifacthub.io/images: |
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
