name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  # Keep tagged releases immutable, but prevent an older main run from
  # finishing last and moving the mutable main image tag backwards.
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify modules
        run: go mod tidy -diff
      - name: Vet
        run: go vet ./...
      - name: Verify formatting
        shell: bash
        run: |
          out=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
      - name: Test
        run: go test -race ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Install Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.21.3
      - name: Verify supported Helm configurations and packaged chart
        run: make helm-check
      - name: Verify release versions
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#v}"
          chart_version="$(awk '$1 == "version:" {print $2; exit}' charts/external-dns-porkbun-webhook/Chart.yaml)"
          app_version="$(awk '$1 == "appVersion:" {gsub(/\"/, "", $2); print $2; exit}' charts/external-dns-porkbun-webhook/Chart.yaml)"
          example_image_tag="$(awk '$1 == "tag:" {gsub(/\"/, "", $2); print $2; exit}' docs/external-dns-values.yaml)"
          wrapper_image_tag="$(awk '$1 == "tag:" {gsub(/\"/, "", $2); print $2; exit}' charts/external-dns-porkbun-webhook/values.yaml)"
          test "$expected" = "$chart_version"
          test "$expected" = "$app_version"
          test "$expected" = "$example_image_tag"
          test "$expected" = "$wrapper_image_tag"
          grep -Fq "image: ghcr.io/mattgmoser/external-dns-porkbun-webhook:${expected}" charts/external-dns-porkbun-webhook/Chart.yaml
          grep -Fq 'version: 1.21.1' charts/external-dns-porkbun-webhook/Chart.lock
          grep -Fq 'repositoryID: d669d36c-431f-4e11-826c-e11ca3dd4ec4' artifacthub-repo.yml
          if grep -Eq '^deprecated:[[:space:]]*true' charts/external-dns-porkbun-webhook/Chart.yaml; then
            echo 'active chart must not be marked deprecated' >&2
            exit 1
          fi
          grep -Eq "^## ${expected}([[:space:]]|$)" CHANGELOG.md

  build-image:
    runs-on: ubuntu-latest
    needs: verify
    concurrency:
      # All semver jobs share one lock because their major/minor/latest tags
      # overlap. Branch builds retain per-ref cancellation at workflow level.
      group: ${{ startsWith(github.ref, 'refs/tags/v') && 'release-image-tags' || format('release-image-{0}', github.ref) }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release channels
        id: channels
        shell: bash
        run: |
          echo 'publish=false' >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            exit 0
          fi

          version=${GITHUB_REF_NAME#v}
          major=${version%%.*}
          major_minor=$(cut -d. -f1-2 <<<"$version")
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"

          # Prereleases receive only their immutable full-version tag.
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            exit 0
          fi

          git fetch --force --tags origin
          highest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sed -nE '/^v[0-9]+\.[0-9]+\.[0-9]+$/p' \
            | sort -V \
            | tail -n1)
          if [[ "$GITHUB_REF_NAME" == "$highest" ]]; then
            echo 'publish=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Check immutable image tag
        id: exact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          version=${GITHUB_REF_NAME#v}
          if output=$(docker buildx imagetools inspect "${image}:${version}" 2>&1); then
            scripts/verify-image.sh "${image}:${version}" "$GITHUB_SHA" "$version"
            echo 'exists=true' >> "$GITHUB_OUTPUT"
          elif grep -Eqi 'manifest unknown|not found' <<<"$output"; then
            echo 'exists=false' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit 1
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.channels.outputs.publish == 'true' }}
            type=semver,pattern={{major}},enable=${{ steps.channels.outputs.publish == 'true' }}
            type=raw,value=latest,enable=${{ steps.channels.outputs.publish == 'true' }}
            # A semver event rebuilds the same commit with a release VERSION.
            # Restrict sha-* to branch builds so that candidate tags never move.
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_type == 'branch' }}

      - name: Build and push
        if: steps.exact.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore current release channels from immutable image
        if: startsWith(github.ref, 'refs/tags/v') && steps.exact.outputs.exists == 'true' && steps.channels.outputs.publish == 'true'
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          version=${GITHUB_REF_NAME#v}
          docker buildx imagetools create \
            --tag "${image}:${{ steps.channels.outputs.major_minor }}" \
            --tag "${image}:${{ steps.channels.outputs.major }}" \
            --tag "${image}:latest" \
            "${image}:${version}"

      - name: Verify published release image
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          version=${GITHUB_REF_NAME#v}
          scripts/verify-image.sh "${image}:${version}" "$GITHUB_SHA" "$version"
          if [[ '${{ steps.channels.outputs.publish }}' == 'true' ]]; then
            scripts/verify-image.sh "${image}:${{ steps.channels.outputs.major_minor }}" "$GITHUB_SHA" "$version"
            scripts/verify-image.sh "${image}:${{ steps.channels.outputs.major }}" "$GITHUB_SHA" "$version"
            scripts/verify-image.sh "${image}:latest" "$GITHUB_SHA" "$version"
          fi

  release-chart:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-image
    concurrency:
      group: release-chart
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.21.3

      # First-release bootstrap: chart-releaser pushes packaged charts to a
      # gh-pages branch. On a freshly cloned/forked repo that branch doesn't
      # exist yet, and chart-releaser fails with `fatal: invalid reference:
      # origin/gh-pages`. Create an empty orphan gh-pages branch if missing.
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch missing — bootstrapping for first release"
            worktree_parent=$(mktemp -d)
            tmp="$worktree_parent/gh-pages"
            git worktree add -B gh-pages "$tmp" --no-checkout
            (
              cd "$tmp"
              git rm -rf . >/dev/null 2>&1 || true
              touch .nojekyll
              git add .nojekyll
              git commit -m "Initialize gh-pages branch"
              git push origin gh-pages
            )
            git worktree remove --force "$tmp"
          else
            echo "gh-pages branch already exists — nothing to do"
          fi

      # Import GPG signing key from secrets, so we can produce signed chart
      # packages (.tgz.prov files alongside the .tgz). Artifact Hub uses the
      # presence of the .prov file to render the "Signed" badge.
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Helm package --sign needs the legacy secring.gpg format. Modern GPG
          # (2.x) doesn't write it by default; re-export the secret keys to
          # produce one helm can read.
          gpg --export-secret-keys > "$HOME/.gnupg/secring.gpg"

      - name: Package chart with signature
        run: |
          mkdir -p .cr-release-packages
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/ --force-update
          helm dependency build charts/external-dns-porkbun-webhook
          helm package \
            --sign \
            --key '46821505+mattgmoser@users.noreply.github.com' \
            --keyring "$HOME/.gnupg/secring.gpg" \
            --destination .cr-release-packages \
            charts/external-dns-porkbun-webhook
          ls -la .cr-release-packages

      - name: Verify signed, self-contained chart package
        run: |
          package=".cr-release-packages/external-dns-porkbun-webhook-${GITHUB_REF_NAME#v}.tgz"
          public_keyring="$RUNNER_TEMP/chart-signing-public.gpg"
          gpg --batch --export '1CD080E5799F3F24960E791966B9EDBB9FE0C877' > "$public_keyring"
          helm verify --keyring "$public_keyring" "$package"
          archive_listing="$(tar tzf "$package")"
          dependency_chart='external-dns-porkbun-webhook/charts/external-dns/Chart.yaml'
          grep -Fqx "$dependency_chart" <<< "$archive_listing"
          dependency_version="$(tar xOf "$package" "$dependency_chart" | awk '$1 == "version:" {print $2; exit}')"
          dependency_app_version="$(tar xOf "$package" "$dependency_chart" | awk '$1 == "appVersion:" {print $2; exit}')"
          test "$dependency_version" = '1.21.1'
          test "$dependency_app_version" = '0.21.0'
          if grep -Fq 'artifacthub-repo.yml' <<< "$archive_listing"; then
            echo 'repository metadata must not be embedded in the chart package' >&2
            exit 1
          fi
          test_values="$RUNNER_TEMP/chart-test-values.yaml"
          bash scripts/chart-test-values.sh charts/external-dns-porkbun-webhook/values.yaml > "$test_values"
          helm template external-dns "$package" \
            --namespace external-dns \
            --values "$test_values" >/dev/null

      # Install the chart-releaser CLI directly and verify the release checksum.
      - name: Install chart-releaser
        run: |
          CR_VERSION=1.8.1
          archive="chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}"
          cd "$RUNNER_TEMP"
          curl --fail --silent --show-error --location --output "$archive" "$base_url/$archive"
          curl --fail --silent --show-error --location --output checksums.txt "$base_url/checksums.txt"
          grep "  ${archive}$" checksums.txt | sha256sum --check -
          tar xzf "$archive" cr
          sudo install cr /usr/local/bin/cr
          cr version

      - name: Upload chart to GitHub releases
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr upload \
            --owner '${{ github.repository_owner }}' \
            --git-repo '${{ github.event.repository.name }}' \
            --token "$CR_TOKEN" \
            --commit "$GITHUB_SHA" \
            --package-path .cr-release-packages \
            --skip-existing

      - name: Verify uploaded chart release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          release_tag="external-dns-porkbun-webhook-${version}"
          package=".cr-release-packages/${release_tag}.tgz"
          provenance="${package}.prov"
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}")"

          test "$(jq -r '.tag_name' <<< "$release_json")" = "$release_tag"
          test "$(jq -r '.target_commitish' <<< "$release_json")" = "$GITHUB_SHA"
          test "$(jq -r '.draft' <<< "$release_json")" = 'false'
          test "$(jq -r '.prerelease' <<< "$release_json")" = 'false'

          if [[ "$(jq '.assets | length' <<< "$release_json")" -ne 2 ]]; then
            echo 'chart release must contain only its package and provenance assets' >&2
            exit 1
          fi

          for asset in "$(basename "$package")" "$(basename "$provenance")"; do
            count="$(jq --arg name "$asset" '[.assets[] | select(.name == $name)] | length' <<< "$release_json")"
            if [ "$count" -ne 1 ]; then
              echo "release must contain exactly one $asset asset" >&2
              exit 1
            fi
          done

          download_dir=.cr-verified-packages
          mkdir "$download_dir"
          gh release download "$release_tag" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$(basename "$package")" \
            --pattern "$(basename "$provenance")" \
            --dir "$download_dir"

          remote_package="$download_dir/$(basename "$package")"
          public_keyring="$RUNNER_TEMP/chart-signing-public.gpg"
          gpg --batch --export '1CD080E5799F3F24960E791966B9EDBB9FE0C877' > "$public_keyring"
          helm verify --keyring "$public_keyring" "$remote_package"

          # Helm archive headers and signatures are intentionally
          # nondeterministic. Compare the unpacked chart (including the
          # unpacked dependency) so a safe retry accepts identical content
          # without pretending regenerated package bytes are immutable.
          normalize_chart() {
            source_package=$1
            destination=$2
            mkdir "$destination"
            tar xzf "$source_package" -C "$destination"
            while IFS= read -r -d '' dependency; do
              dependency_dir="${dependency}.contents"
              mkdir "$dependency_dir"
              tar xzf "$dependency" -C "$dependency_dir"
              rm "$dependency"
            done < <(find "$destination" -type f -name '*.tgz' -print0)
          }
          compare_parent=$(mktemp -d)
          normalize_chart "$package" "$compare_parent/local"
          normalize_chart "$remote_package" "$compare_parent/remote"
          diff -ruN "$compare_parent/local" "$compare_parent/remote"

      # Artifact Hub reads repository metadata and the landing page from the
      # chart repository root, beside index.yaml (not from inside a chart).
      # Publish these first so the subsequent semantic index change triggers a
      # scan with the companion files already present.
      - name: Publish Helm repository metadata
        run: |
          pages_parent="$(mktemp -d)"
          pages_dir="$pages_parent/gh-pages"
          git fetch origin gh-pages
          git worktree add --detach "$pages_dir" origin/gh-pages
          install -m 0644 artifacthub-repo.yml "$pages_dir/artifacthub-repo.yml"
          install -m 0644 .github/helm-repository/index.html "$pages_dir/index.html"
          git -C "$pages_dir" add artifacthub-repo.yml index.html
          if ! git -C "$pages_dir" diff --cached --quiet; then
            git -C "$pages_dir" commit -m "Publish Helm repository metadata"
            git -C "$pages_dir" push origin HEAD:gh-pages
          fi
          git worktree remove --force "$pages_dir"

      - name: Update gh-pages index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cr-index
          # Index the immutable bytes downloaded from the GitHub release,
          # not the newly regenerated package from this workflow attempt.
          cr index \
            --owner '${{ github.repository_owner }}' \
            --git-repo '${{ github.event.repository.name }}' \
            --token "$CR_TOKEN" \
            --package-path .cr-verified-packages \
            --index-path .cr-index/index.yaml \
            --pages-branch gh-pages \
            --push
