name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for chart-releaser
  packages: write   # for ghcr.io image push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-chart:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-image
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      # First-release bootstrap: chart-releaser pushes packaged charts to a
      # gh-pages branch. On a freshly cloned/forked repo that branch doesn't
      # exist yet, and chart-releaser fails with `fatal: invalid reference:
      # origin/gh-pages`. Create an empty orphan gh-pages branch if missing.
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch missing — bootstrapping for first release"
            tmp=$(mktemp -d)
            git worktree add -B gh-pages "$tmp" --no-checkout
            (
              cd "$tmp"
              git rm -rf . >/dev/null 2>&1 || true
              touch .nojekyll
              git add .nojekyll
              git commit -m "Initialize gh-pages branch"
              git push origin gh-pages
            )
            git worktree remove --force "$tmp"
          else
            echo "gh-pages branch already exists — nothing to do"
          fi

      # Import GPG signing key from secrets, so we can produce signed chart
      # packages (.tgz.prov files alongside the .tgz). Artifact Hub uses the
      # presence of the .prov file to render the "Signed" badge.
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Helm package --sign needs the legacy secring.gpg format. Modern GPG
          # (2.x) doesn't write it by default; re-export the secret keys to
          # produce one helm can read.
          gpg --export-secret-keys > "$HOME/.gnupg/secring.gpg"

      - name: Package chart with signature
        run: |
          mkdir -p .cr-release-packages
          helm package \
            --sign \
            --key '46821505+mattgmoser@users.noreply.github.com' \
            --keyring "$HOME/.gnupg/secring.gpg" \
            --destination .cr-release-packages \
            charts/external-dns-porkbun-webhook
          ls -la .cr-release-packages

      - name: Run chart-releaser (upload only)
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_packaging: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
