name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: go.mod and go.sum are tidy
        run: go mod tidy -diff
      - name: vet
        run: go vet ./...
      - name: gofmt check
        run: |
          out=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$out" ]; then
            echo "::error::Files need gofmt:"
            echo "$out"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - name: vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: coverage
        run: go tool cover -func=coverage.out | tail -5
      - name: Install Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.21.3
      - name: Verify supported Helm configurations and packaged chart
        run: make helm-check
      - name: Check documentation links
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          # The release-pinned link becomes live when this candidate is tagged.
          # All other links, including the pinned upstream dependency, are live
          # and checked on the pull request/main commit.
          args: >-
            --no-progress
            --exclude '^https://github\.com/mattgmoser/external-dns-porkbun-webhook/blob/v0\.4\.0/'
            './**/*.md'
            './.github/helm-repository/*.html'
          fail: true
