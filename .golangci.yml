run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - revive

linters-settings:
  errcheck:
    # Errors from these are pointless to handle in our HTTP/metrics paths
    # (client disconnects, etc.). Real failures in handlers go through normal err vars.
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode
      - (io.Writer).Write
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Fprint

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
