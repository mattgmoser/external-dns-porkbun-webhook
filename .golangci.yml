version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - revive
  settings:
    errcheck:
      # Errors from these are pointless to handle in our HTTP/metrics paths
      # (client disconnects, etc.). Real handler failures use normal err vars.
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (io.Writer).Write
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
